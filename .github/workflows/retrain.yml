name: Automated Model Retraining

on:
  schedule:
    - cron: "0 0 * * 0"   # Every Sunday

  workflow_dispatch:

jobs:
  retrain:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r .streamlit/requirements.txt

    - name: Verify Dataset
      run: |
        if [ ! -f data/train.csv ]; then
          echo "Dataset not found!"
          exit 1
        fi

    - name: Retrain Model
      run: |
        python .streamlit/train_models.py

    - name: Check for Updated Models
      id: check_changes
      run: |
        git diff --quiet models/ || echo "changed=true" >> $GITHUB_OUTPUT

    - name: Commit Updated Models
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        git add models/
        git add mlflow.db
        git add mlruns/

        git commit -m "Automatic weekly retraining"

    - name: Push Changes
      if: steps.check_changes.outputs.changed == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}