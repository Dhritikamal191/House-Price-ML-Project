name: End-to-End MLOps Pipeline

on:
  schedule:
    - cron: "0 0 * * 0"   # Every Sunday 00:00 UTC

  workflow_dispatch:

jobs:

  retrain:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Dataset
        run: |
          if [ ! -f data/train.csv ]; then
            echo "Dataset not found."
            exit 1
          fi

      - name: Retrain Models
        run: |
          python train_models.py

      - name: Verify Model Artifacts
        run: |
            test -f models/best_model.pkl
            test -f data/metrics.json

      - name: Check for Model Changes
        id: changes
        run: |
          if git diff --quiet models; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit Updated Models
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
     
          git add models
          git add data/metrics.json         

          - name: Run Drift Detection
            run: |
                python drift_detection.py

          - name: Run Retraining Check
            run: |
                python retrain.py

          git commit -m "Automatic weekly retraining"

      - name: Push to GitHub
        if: steps.changes.outputs.changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}